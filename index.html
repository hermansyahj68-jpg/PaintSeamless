<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <link rel="stylesheet" href="style.css?v=1.2">
    
     <!-- ICON -->
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
    <title>Editor Gambar Seamless</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #ccc;
            overflow: hidden;
            touch-action: none;
        }

        .ui-panel {
            width: 100%;
            max-width: 500px;
            background-color: #333;
            border-bottom-left-radius: 0px;
            border-bottom-right-radius: 0px;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 20;
            flex-shrink: 0;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            justify-content: center;
        }

        .icon-btn {
            background-color: #2e5873;
            border: 1px solid #0088c7;
            border-radius: 6px;
            padding: 3px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            color: white;
            flex: 0 0 calc((100% - 48px) / 9);
            height: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            position: relative;
        }

        .icon-btn:active {
            background-color: #00ffff;
        }

        .icon-btn.active {
            background-color: #ff3b30;
            border-color: #ff3b30;
        }

        #btnRopeMode.active {
            background-color: #4caf50;
            border-color: #4caf50;
        }

        #btnWaveBrush.active {
            background-color: #2196f3;
            border-color: #2196f3;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); }
            70% { box-shadow: 0 0 0 5px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }

        #btnShift.active {
            background-color: #ffcc00;
            color: #000;
            border-color: #ffcc00;
        }

        .menu-text {
            font-size: 7px;
            margin-top: 2px;
            color: white;
        }

        .settings-panel {
            display: none;
            margin-top: 8px;
            background: #2a2a2a;
            padding: 8px;
            border-radius: 10px;
            font-size: 7px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        input[type="number"] {
            background-color: #1a1a1a;
            border: 1px solid #0088c7;
            color: white;
            padding: 3px;
            width: 50px;
            border-radius: 4px;
            font-size: 8px;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-row label {
            width: 80px;
            font-size: 11px;
            text-align: right;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #007aff;
            height: 3px;
        }

        .value-label {
            width: 25px;
            text-align: left;
            font-size: 11px;
            color: #aaa;
        }

        .wave-type-buttons {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            justify-content: center;
        }
        
        .wave-type-btn {
            background-color: #444;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 10px;
            color: white;
            transition: 0.2s;
        }
        
        .wave-type-btn.active {
            background-color: #2196f3;
            border-color: #2196f3;
        }
        
        .wave-type-btn:active {
            background-color: #00ffff;
        }

        #canvasBox {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            touch-action: none;
        }

        #canvasBox.shift-mode {
            cursor: crosshair;
        }

        #viewCanvas {
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee),
            linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee);
            background-size: 20px 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
        }

        .rope-indicator {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #4caf50;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        
        .seamless-hint {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffcc00;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        
        .wave-hint {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(33,150,243,0.9);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="toolbar">
        <button class="icon-btn" onclick="window.loadImage()">🗂️<span class="menu-text">gambar</span></button>
        <button class="icon-btn" onclick="window.loadBrush()">🎨<span class="menu-text">brush</span></button>
        <button class="icon-btn" id="btnDraw" onclick="window.setMode('draw')">🖌️<span class="menu-text">draw</span></button>
        <button class="icon-btn active" id="btnMove" onclick="window.setMode('move')">✋<span class="menu-text">geser</span></button>
        <button class="icon-btn" id="btnShift" onclick="window.setMode('shift')">🔄<span class="menu-text">seamless</span></button>
        <button class="icon-btn" id="btnWaveBrush" onclick="window.toggleWaveBrush()">🌊<span class="menu-text">wave brush</span></button>
        <button class="icon-btn" id="btnRopeMode" onclick="window.toggleRopeMode()">🎯<span class="menu-text">rope mode</span></button>
        <button class="icon-btn" onclick="window.undo()">↩️<span class="menu-text">undo</span></button>
        <button class="icon-btn" onclick="window.redo()">↪️<span class="menu-text">redo</span></button>
        <button class="icon-btn" id="btnFlipY" onclick="window.toggleFlipY()">🔃<span class="menu-text">flip Y</span></button>
        <button class="icon-btn" id="btnFlipX" onclick="window.toggleFlipX()">🔁<span class="menu-text">flip X</span></button>
        <button class="icon-btn" id="btnMirror" onclick="window.toggleMirror()">🪞<span class="menu-text">mirror</span></button>
        <button class="icon-btn" onclick="window.savePNG()">📤<span class="menu-text">simpan</span></button>
        <button class="icon-btn" onclick="window.toggleSettings()">🛠️<span class="menu-text">setting</span></button>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <div class="settings-row">
            <div class="input-group">
                <button class="icon-btn" onclick="window.newCanvas()" style="flex:none; width:auto; padding:5px;">📄<span class="menu-text">New</span></button>
                <label>W:</label><input type="number" id="canvasW" value="800">
            </div>
            <div class="input-group">
                <label>H:</label><input type="number" id="canvasH" value="800">
            </div>
            <span>Zoom: <span id="zoomVal">100</span>%</span>
        </div>

        <div class="slider-container">
            <div class="slider-row">
                <label>Ukuran Brush:</label>
                <input type="range" id="brushSize" min="10" max="3000" value="50">
                <span class="value-label" id="brushSizeVal">50</span>
            </div>
            <div class="slider-row">
                <label>Kepadatan:</label>
                <input type="range" id="densitySlider" min="1" max="50" value="15">
                <span class="value-label" id="densityVal">15</span>
            </div>
            <div class="slider-row">
                <label>Transparansi:</label>
                <input type="range" id="opacitySlider" min="1" max="100" value="100">
                <span class="value-label" id="opacityVal">100</span>
            </div>
            <div class="slider-row">
                <label>Kekuatan Wave:</label>
                <input type="range" id="waveStrength" min="1" max="50" value="15">
                <span class="value-label" id="waveStrengthVal">15</span>
            </div>
            <div class="slider-row">
                <label>Frekuensi Wave:</label>
                <input type="range" id="waveFrequency" min="1" max="20" value="5">
                <span class="value-label" id="waveFrequencyVal">5</span>
            </div>
            <div class="slider-row">
                <label>Arah Wave:</label>
                <input type="range" id="waveDirection" min="0" max="360" value="0">
                <span class="value-label" id="waveDirectionVal">0°</span>
            </div>
            <div class="wave-type-buttons">
                <button class="wave-type-btn active" id="waveTypeCircle" onclick="window.setWaveType('circle')">⚪ Bulat</button>
                <button class="wave-type-btn" id="waveTypeLine" onclick="window.setWaveType('line')">📏 Garis Lurus</button>
            </div>
            <div class="slider-row">
                <label>Cermin Fade:</label>
                <input type="range" id="mirrorFadeSlider" min="0" max="100" value="25">
                <span class="value-label" id="mirrorFadeVal">25</span>
            </div>
            <div class="input-group">
                <label>Offset:</label>
                <input type="number" id="mirrorOffsetInput" value="0.9" step="0.1">
            </div>
        </div>
    </div>
</div>

<div id="canvasBox">
    <canvas id="viewCanvas"></canvas>
</div>

<input type="file" id="imageInput" accept="image/*" hidden>
<input type="file" id="brushInput" accept="image/*" hidden>

<script>
    (function () {
        // === DOM Elements ===
        const canvasBox = document.getElementById("canvasBox");
        const canvas = document.getElementById("viewCanvas");
        const ctx = canvas.getContext("2d");
        const zoomValLabel = document.getElementById("zoomVal");
        const brushSlider = document.getElementById("brushSize");
        const brushSizeValLabel = document.getElementById("brushSizeVal");
        const densitySlider = document.getElementById("densitySlider");
        const densityValLabel = document.getElementById("densityVal");
        const opacitySlider = document.getElementById("opacitySlider");
        const opacityValLabel = document.getElementById("opacityVal");
        const ropeIndicator = document.getElementById("ropeIndicator");
        const waveStrengthSlider = document.getElementById("waveStrength");
        const waveStrengthVal = document.getElementById("waveStrengthVal");
        const waveFrequencySlider = document.getElementById("waveFrequency");
        const waveFrequencyVal = document.getElementById("waveFrequencyVal");
        const waveDirectionSlider = document.getElementById("waveDirection");
        const waveDirectionVal = document.getElementById("waveDirectionVal");
        const waveHint = document.getElementById("waveHint");

        // === Canvas Data ===
        let drawCanvas = document.createElement("canvas");
        let drawCtx = drawCanvas.getContext("2d");
        let tempCanvas = document.createElement("canvas");
        let tempCtx = tempCanvas.getContext("2d");

        let brush = null;
        let mode = "move";
        let strokes = [];
        let redoStack = [];

        // View Transform
        let scale = 1.0;
        let offsetX = 0, offsetY = 0;

        // Interaction flags
        let isDragging = false;
        let lastPointerX = 0, lastPointerY = 0;

        // Rope mode
        let ropeModeEnabled = false;
        let ropeStartX = 0, ropeStartY = 0;
        let ropeEndX = 0, ropeEndY = 0;
        let isRopeActive = false;
        
        // Instant draw mode
        let lastDrawX = 0, lastDrawY = 0;
        let isDrawing = false;

        // Wave Brush mode
        let waveBrushEnabled = false;
        let waveType = "circle"; // "circle" or "line"
        let waveStrength = 15;
        let waveFrequency = 5;
        let waveDirection = 0; // in degrees, for line wave
        let waveTime = 0;

        // Shift mode variables
        let shiftStartX = 0, shiftStartY = 0;
        const GRID_SIZE = 50;

        // Brush & Effects
        let brushSizeValue = 50;
        let densityValue = 15;
        let opacityValue = 1.0;
        let flipX = 1;
        let flipY = 1;
        let mirrorMode = false;
        let mirrorOffsetFactor = 0.9;
        let mirrorFade = 0.25;

        // Pinch zoom
        let initialPinchDist = null;
        let initialScale = 1.0;
        let pinchCenterX = 0, pinchCenterY = 0;

        // === Wave Effect Functions ===
        function applyWaveEffectCircle(x, y, radius) {
            const w = drawCanvas.width;
            const h = drawCanvas.height;
            const strength = waveStrength;
            const freq = waveFrequency;
            
            const startX = Math.max(0, Math.floor(x - radius));
            const startY = Math.max(0, Math.floor(y - radius));
            const endX = Math.min(w, Math.ceil(x + radius));
            const endY = Math.min(h, Math.ceil(y + radius));
            const width = endX - startX;
            const height = endY - startY;
            
            if (width <= 0 || height <= 0) return false;
            
            const tempArea = document.createElement("canvas");
            tempArea.width = width;
            tempArea.height = height;
            const tempAreaCtx = tempArea.getContext("2d");
            
            tempAreaCtx.drawImage(drawCanvas, startX, startY, width, height, 0, 0, width, height);
            
            const imageData = tempAreaCtx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const newData = new Uint8ClampedArray(data.length);
            
            const centerX = x - startX;
            const centerY = y - startY;
            
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const dx = px - centerX;
                    const dy = py - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < radius) {
                        const intensity = (1 - distance / radius) * strength;
                        const angle = Math.atan2(dy, dx);
                        const waveOffset = Math.sin(distance * freq * 0.2 + waveTime) * intensity;
                        
                        let srcX = px + Math.cos(angle) * waveOffset;
                        let srcY = py + Math.sin(angle) * waveOffset;
                        
                        srcX = Math.max(0, Math.min(width - 1, srcX));
                        srcY = Math.max(0, Math.min(height - 1, srcY));
                        
                        const srcIdx = (Math.floor(srcY) * width + Math.floor(srcX)) * 4;
                        const dstIdx = (py * width + px) * 4;
                        
                        newData[dstIdx] = data[srcIdx];
                        newData[dstIdx + 1] = data[srcIdx + 1];
                        newData[dstIdx + 2] = data[srcIdx + 2];
                        newData[dstIdx + 3] = data[srcIdx + 3];
                    } else {
                        const idx = (py * width + px) * 4;
                        newData[idx] = data[idx];
                        newData[idx + 1] = data[idx + 1];
                        newData[idx + 2] = data[idx + 2];
                        newData[idx + 3] = data[idx + 3];
                    }
                }
            }
            
            const newImageData = new ImageData(newData, width, height);
            tempAreaCtx.putImageData(newImageData, 0, 0);
            drawCtx.drawImage(tempArea, startX, startY);
            
            return true;
        }

        function applyWaveEffectLine(x, y, radius) {
            const w = drawCanvas.width;
            const h = drawCanvas.height;
            const strength = waveStrength;
            const freq = waveFrequency;
            const directionRad = waveDirection * Math.PI / 180;
            const dirX = Math.cos(directionRad);
            const dirY = Math.sin(directionRad);
            const perpX = -dirY;
            const perpY = dirX;
            
            const startX = Math.max(0, Math.floor(x - radius));
            const startY = Math.max(0, Math.floor(y - radius));
            const endX = Math.min(w, Math.ceil(x + radius));
            const endY = Math.min(h, Math.ceil(y + radius));
            const width = endX - startX;
            const height = endY - startY;
            
            if (width <= 0 || height <= 0) return false;
            
            const tempArea = document.createElement("canvas");
            tempArea.width = width;
            tempArea.height = height;
            const tempAreaCtx = tempArea.getContext("2d");
            
            tempAreaCtx.drawImage(drawCanvas, startX, startY, width, height, 0, 0, width, height);
            
            const imageData = tempAreaCtx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const newData = new Uint8ClampedArray(data.length);
            
            const centerX = x - startX;
            const centerY = y - startY;
            
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const dx = px - centerX;
                    const dy = py - centerY;
                    const distance = Math.abs(dx * dirX + dy * dirY);
                    const perpDistance = dx * perpX + dy * perpY;
                    
                    if (distance < radius) {
                        const intensity = (1 - distance / radius) * strength;
                        const waveOffset = Math.sin(perpDistance * freq * 0.15 + waveTime) * intensity;
                        
                        let srcX = px + dirX * waveOffset;
                        let srcY = py + dirY * waveOffset;
                        
                        srcX = Math.max(0, Math.min(width - 1, srcX));
                        srcY = Math.max(0, Math.min(height - 1, srcY));
                        
                        const srcIdx = (Math.floor(srcY) * width + Math.floor(srcX)) * 4;
                        const dstIdx = (py * width + px) * 4;
                        
                        newData[dstIdx] = data[srcIdx];
                        newData[dstIdx + 1] = data[srcIdx + 1];
                        newData[dstIdx + 2] = data[srcIdx + 2];
                        newData[dstIdx + 3] = data[srcIdx + 3];
                    } else {
                        const idx = (py * width + px) * 4;
                        newData[idx] = data[idx];
                        newData[idx + 1] = data[idx + 1];
                        newData[idx + 2] = data[idx + 2];
                        newData[idx + 3] = data[idx + 3];
                    }
                }
            }
            
            const newImageData = new ImageData(newData, width, height);
            tempAreaCtx.putImageData(newImageData, 0, 0);
            drawCtx.drawImage(tempArea, startX, startY);
            
            return true;
        }

        function applyWaveEffect(x, y, radius) {
            if (!waveBrushEnabled) return false;
            
            if (waveType === "circle") {
                return applyWaveEffectCircle(x, y, radius);
            } else {
                return applyWaveEffectLine(x, y, radius);
            }
        }

        function drawWaveBrushAt(x, y) {
            if (!brush) return;
            
            const size = brushSizeValue;
            const ratio = brush.width / brush.height;
            let dw = ratio >= 1 ? size : size * ratio;
            let dh = ratio >= 1 ? size / ratio : size;
            
            drawCtx.save();
            drawCtx.translate(x, y);
            drawCtx.scale(flipX, flipY);
            drawCtx.globalAlpha = opacityValue;
            drawCtx.drawImage(brush, -dw / 2, -dh / 2, dw, dh);
            drawCtx.restore();
            
            const radius = Math.max(dw, dh) / 1.5;
            applyWaveEffect(x, y, radius);
            
            if (mirrorMode) {
                const mirrorY = y + (dh * mirrorOffsetFactor) + 10;
                drawCtx.save();
                drawCtx.translate(x, mirrorY);
                drawCtx.scale(flipX, -flipY);
                drawCtx.globalAlpha = opacityValue * mirrorFade;
                drawCtx.drawImage(brush, -dw / 2, -dh / 2, dw, dh);
                drawCtx.restore();
                applyWaveEffect(x, mirrorY, radius);
            }
        }

        function drawWaveLineContinuous(x1, y1, x2, y2) {
            if (!brush) return;
            const distance = Math.hypot(x2 - x1, y2 - y1);
            if (distance === 0) {
                drawWaveBrushAt(x1, y1);
                return;
            }
            const stepSize = brushSizeValue / (densityValue * 1.2);
            const steps = Math.max(1, Math.ceil(distance / stepSize));
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = x1 + (x2 - x1) * t;
                const y = y1 + (y2 - y1) * t;
                drawWaveBrushAt(x, y);
            }
        }

        // === Helper Functions ===
        function resizeCanvasToWindow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function centerCamera() {
            const margin = 50;
            offsetX = margin;
            offsetY = margin + 75;
            scale = Math.min((window.innerWidth - 100) / drawCanvas.width, (window.innerHeight - 200) / drawCanvas.height, 2);
            scale = Math.max(0.1, scale);
        }

        function getInternalCoord(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left - offsetX) / scale,
                y: (clientY - rect.top - offsetY) / scale
            };
        }

        function saveState() {
            strokes.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
            if (strokes.length > 25) strokes.shift();
            redoStack = [];
        }

        function drawBrushAt(x, y, currentOpacity = opacityValue) {
            if (!brush) return;
            const size = brushSizeValue;
            const ratio = brush.width / brush.height;
            let dw = ratio >= 1 ? size : size * ratio;
            let dh = ratio >= 1 ? size / ratio : size;
            
            drawCtx.save();
            drawCtx.translate(x, y);
            drawCtx.scale(flipX, flipY);
            drawCtx.globalAlpha = currentOpacity;
            drawCtx.drawImage(brush, -dw / 2, -dh / 2, dw, dh);
            drawCtx.restore();

            if (mirrorMode) {
                const mirrorY = y + (dh * mirrorOffsetFactor) + 10;
                drawCtx.save();
                drawCtx.translate(x, mirrorY);
                drawCtx.scale(flipX, -flipY);
                drawCtx.globalAlpha = currentOpacity * mirrorFade;
                drawCtx.drawImage(brush, -dw / 2, -dh / 2, dw, dh);
                drawCtx.restore();
            }
        }

        function drawLineContinuous(x1, y1, x2, y2) {
            if (!brush) return;
            const distance = Math.hypot(x2 - x1, y2 - y1);
            if (distance === 0) {
                if (waveBrushEnabled) {
                    drawWaveBrushAt(x1, y1);
                } else {
                    drawBrushAt(x1, y1);
                }
                return;
            }
            const stepSize = brushSizeValue / (densityValue * 1.2);
            const steps = Math.max(1, Math.ceil(distance / stepSize));
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = x1 + (x2 - x1) * t;
                const y = y1 + (y2 - y1) * t;
                if (waveBrushEnabled) {
                    drawWaveBrushAt(x, y);
                } else {
                    drawBrushAt(x, y);
                }
            }
        }

        function commitRopeDrawing() {
            if (!isRopeActive) return;
            if (brush) {
                saveState();
                drawLineContinuous(ropeStartX, ropeStartY, ropeEndX, ropeEndY);
            }
            isRopeActive = false;
        }

        function drawInstantSegment(x1, y1, x2, y2) {
            if (!brush) return;
            drawLineContinuous(x1, y1, x2, y2);
        }

        // Fungsi seamless
        function applySeamlessShift(deltaX, deltaY) {
            const gridShiftX = Math.round(deltaX / GRID_SIZE) * GRID_SIZE;
            const gridShiftY = Math.round(deltaY / GRID_SIZE) * GRID_SIZE;
            
            if (gridShiftX === 0 && gridShiftY === 0) {
                return false;
            }
            
            const w = drawCanvas.width;
            const h = drawCanvas.height;
            
            let shiftX = gridShiftX % w;
            let shiftY = gridShiftY % h;
            if (shiftX < 0) shiftX += w;
            if (shiftY < 0) shiftY += h;
            
            tempCanvas.width = w;
            tempCanvas.height = h;
            tempCtx.clearRect(0, 0, w, h);
            
            tempCtx.drawImage(drawCanvas, 0, 0, w - shiftX, h - shiftY, shiftX, shiftY, w - shiftX, h - shiftY);
            if (shiftX > 0) {
                tempCtx.drawImage(drawCanvas, w - shiftX, 0, shiftX, h - shiftY, 0, shiftY, shiftX, h - shiftY);
            }
            if (shiftY > 0) {
                tempCtx.drawImage(drawCanvas, 0, h - shiftY, w - shiftX, shiftY, shiftX, 0, w - shiftX, shiftY);
            }
            if (shiftX > 0 && shiftY > 0) {
                tempCtx.drawImage(drawCanvas, w - shiftX, h - shiftY, shiftX, shiftY, 0, 0, shiftX, shiftY);
            }
            
            drawCtx.clearRect(0, 0, w, h);
            drawCtx.drawImage(tempCanvas, 0, 0);
            
            return true;
        }

        // === RENDER LOOP ===
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
            ctx.drawImage(drawCanvas, 0, 0);

            if (mode === "draw" && ropeModeEnabled && isRopeActive && brush) {
                const distance = Math.hypot(ropeEndX - ropeStartX, ropeEndY - ropeStartY);
                if (distance > 0.1) {
                    const stepSize = brushSizeValue / (densityValue * 1.2);
                    const steps = Math.max(1, Math.ceil(distance / stepSize));
                    ctx.save();
                    ctx.globalAlpha = 0.55;
                    for (let i = 0; i <= steps; i++) {
                        const t = i / steps;
                        const x = ropeStartX + (ropeEndX - ropeStartX) * t;
                        const y = ropeStartY + (ropeEndY - ropeStartY) * t;
                        const size = brushSizeValue;
                        const ratio = brush.width / brush.height;
                        let dw = ratio >= 1 ? size : size * ratio;
                        let dh = ratio >= 1 ? size / ratio : size;
                        ctx.drawImage(brush, x - dw / 2, y - dh / 2, dw, dh);
                    }
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.globalAlpha = 0.55;
                    const size = brushSizeValue;
                    const ratio = brush.width / brush.height;
                    let dw = ratio >= 1 ? size : size * ratio;
                    let dh = ratio >= 1 ? size / ratio : size;
                    ctx.drawImage(brush, ropeStartX - dw / 2, ropeStartY - dh / 2, dw, dh);
                    ctx.restore();
                }
            }

            ctx.strokeStyle = (mode === 'shift') ? "#ffcc00" : "#444";
            ctx.lineWidth = 2 / scale;
            ctx.strokeRect(0, 0, drawCanvas.width, drawCanvas.height);

            ctx.restore();

            zoomValLabel.innerText = Math.round(scale * 100);
            requestAnimationFrame(render);
        }

        // === Interaksi ===
        function startInteraction(clientX, clientY) {
            if (mode === "draw" && !brush) return;
            isDragging = true;
            lastPointerX = clientX;
            lastPointerY = clientY;
            const internal = getInternalCoord(clientX, clientY);
            
            if (mode === "draw" && brush) {
                if (ropeModeEnabled) {
                    ropeStartX = internal.x;
                    ropeStartY = internal.y;
                    ropeEndX = internal.x;
                    ropeEndY = internal.y;
                    isRopeActive = true;
                } else {
                    if (internal.x >= 0 && internal.x <= drawCanvas.width && 
                        internal.y >= 0 && internal.y <= drawCanvas.height) {
                        saveState();
                        lastDrawX = internal.x;
                        lastDrawY = internal.y;
                        isDrawing = true;
                        if (waveBrushEnabled) {
                            drawWaveBrushAt(internal.x, internal.y);
                        } else {
                            drawBrushAt(internal.x, internal.y);
                        }
                    } else {
                        isDragging = false;
                    }
                }
            } 
            else if (mode === "shift") {
                saveState();
                shiftStartX = clientX;
                shiftStartY = clientY;
            }
        }

        function moveInteraction(clientX, clientY) {
            if (!isDragging) return;
            
            if (mode === "move") {
                const dx = clientX - lastPointerX;
                const dy = clientY - lastPointerY;
                offsetX += dx;
                offsetY += dy;
                lastPointerX = clientX;
                lastPointerY = clientY;
            } 
            else if (mode === "draw" && brush) {
                const internal = getInternalCoord(clientX, clientY);
                
                if (ropeModeEnabled && isRopeActive) {
                    ropeEndX = internal.x;
                    ropeEndY = internal.y;
                } 
                else if (!ropeModeEnabled && isDrawing) {
                    if (internal.x >= 0 && internal.x <= drawCanvas.width && 
                        internal.y >= 0 && internal.y <= drawCanvas.height) {
                        drawInstantSegment(lastDrawX, lastDrawY, internal.x, internal.y);
                        lastDrawX = internal.x;
                        lastDrawY = internal.y;
                    }
                }
                lastPointerX = clientX;
                lastPointerY = clientY;
            }
            else if (mode === "shift" && isDragging) {
                lastPointerX = clientX;
                lastPointerY = clientY;
            }
        }

        function endInteraction() {
            if (mode === "draw") {
                if (ropeModeEnabled && isRopeActive) {
                    commitRopeDrawing();
                    isRopeActive = false;
                } else if (!ropeModeEnabled && isDrawing) {
                    isDrawing = false;
                }
                waveTime += 0.5;
            }
            else if (mode === "shift" && isDragging) {
                const startInternal = getInternalCoord(shiftStartX, shiftStartY);
                const endInternal = getInternalCoord(lastPointerX, lastPointerY);
                const deltaX = endInternal.x - startInternal.x;
                const deltaY = endInternal.y - startInternal.y;
                
                const applied = applySeamlessShift(deltaX, deltaY);
                
                if (!applied && strokes.length > 0) {
                    strokes.pop();
                }
            }
            isDragging = false;
            isDrawing = false;
            isRopeActive = false;
        }

        // Pinch zoom
        function handlePinchStart(e) {
            if (e.touches.length !== 2) return;
            const t1 = e.touches[0], t2 = e.touches[1];
            initialPinchDist = Math.hypot(t1.pageX - t2.pageX, t1.pageY - t2.pageY);
            initialScale = scale;
            const centerX = (t1.pageX + t2.pageX) / 2;
            const centerY = (t1.pageY + t2.pageY) / 2;
            const internal = getInternalCoord(centerX, centerY);
            pinchCenterX = internal.x;
            pinchCenterY = internal.y;
            isDragging = false;
        }

        function handlePinchMove(e) {
            if (!initialPinchDist || e.touches.length !== 2) return;
            const t1 = e.touches[0], t2 = e.touches[1];
            const newDist = Math.hypot(t1.pageX - t2.pageX, t1.pageY - t2.pageY);
            let newScale = Math.max(0.05, Math.min(15, initialScale * (newDist / initialPinchDist)));
            const centerX = (t1.pageX + t2.pageX) / 2;
            const centerY = (t1.pageY + t2.pageY) / 2;
            const rect = canvas.getBoundingClientRect();
            offsetX = centerX - rect.left - (pinchCenterX * newScale);
            offsetY = centerY - rect.top - (pinchCenterY * newScale);
            scale = newScale;
        }

        // === Global Functions ===
        window.setWaveType = function(type) {
            waveType = type;
            document.getElementById("waveTypeCircle").classList.toggle("active", type === "circle");
            document.getElementById("waveTypeLine").classList.toggle("active", type === "line");
            if (waveBrushEnabled) {
                waveHint.innerHTML = waveType === "circle" ? "🌊 Wave Brush: ⚪ Bulat" : "🌊 Wave Brush: 📏 Garis Lurus";
            }
        };

        window.toggleWaveBrush = function() {
            waveBrushEnabled = !waveBrushEnabled;
            const btn = document.getElementById("btnWaveBrush");
            if (waveBrushEnabled) {
                btn.classList.add("active");
                waveHint.style.display = "block";
                waveHint.innerHTML = waveType === "circle" ? "🌊 Wave Brush: ⚪ Bulat" : "🌊 Wave Brush: 📏 Garis Lurus";
            } else {
                btn.classList.remove("active");
                waveHint.style.display = "none";
            }
        };

        window.toggleRopeMode = function() {
            ropeModeEnabled = !ropeModeEnabled;
            const btn = document.getElementById("btnRopeMode");
            if (ropeModeEnabled) {
                btn.classList.add("active");
                ropeIndicator.innerHTML = "🎯 Rope Mode: ON (Tarik & Lepas)";
                ropeIndicator.style.color = "#4caf50";
            } else {
                btn.classList.remove("active");
                ropeIndicator.innerHTML = "⚡ Rope Mode: OFF (Langsung nempel)";
                ropeIndicator.style.color = "#ff9800";
            }
            isRopeActive = false;
            isDrawing = false;
        };

        window.setMode = function (m) {
            mode = m;
            document.getElementById("btnDraw").classList.toggle("active", m === "draw");
            document.getElementById("btnMove").classList.toggle("active", m === "move");
            document.getElementById("btnShift").classList.toggle("active", m === "shift");
            canvasBox.classList.toggle("shift-mode", m === "shift");
            isRopeActive = false;
            isDrawing = false;
            isDragging = false;
        };

        window.newCanvas = function () {
            const w = parseInt(document.getElementById("canvasW").value) || 800;
            const h = parseInt(document.getElementById("canvasH").value) || 800;
            drawCanvas.width = w;
            drawCanvas.height = h;
            drawCtx.clearRect(0, 0, w, h);
            strokes = [];
            redoStack = [];
            centerCamera();
        };

        window.undo = function () {
            if (strokes.length > 0) {
                redoStack.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
                let last = strokes.pop();
                drawCtx.putImageData(last, 0, 0);
            }
        };

        window.redo = function () {
            if (redoStack.length > 0) {
                strokes.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
                let next = redoStack.pop();
                drawCtx.putImageData(next, 0, 0);
            }
        };

        window.loadImage = function () {
            document.getElementById("imageInput").click();
        };
        document.getElementById("imageInput").onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    drawCanvas.width = img.width;
                    drawCanvas.height = img.height;
                    document.getElementById("canvasW").value = img.width;
                    document.getElementById("canvasH").value = img.height;
                    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                    drawCtx.drawImage(img, 0, 0);
                    strokes = [];
                    redoStack = [];
                    centerCamera();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.loadBrush = function () {
            document.getElementById("brushInput").click();
        };
        document.getElementById("brushInput").onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                brush = new Image();
                brush.onload = () => {
                    if (mode !== "draw") setMode("draw");
                };
                brush.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        window.savePNG = function () {
            const link = document.createElement("a");
            link.download = "texture_" + Date.now() + ".png";
            link.href = drawCanvas.toDataURL("image/png");
            link.click();
        };

        window.toggleFlipX = function () {
            flipX *= -1;
            document.getElementById("btnFlipX").classList.toggle("active", flipX === -1);
        };
        window.toggleFlipY = function () {
            flipY *= -1;
            document.getElementById("btnFlipY").classList.toggle("active", flipY === -1);
        };
        window.toggleMirror = function () {
            mirrorMode = !mirrorMode;
            document.getElementById("btnMirror").classList.toggle("active", mirrorMode);
        };
        window.toggleSettings = function () {
            const panel = document.getElementById("settingsPanel");
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        };

        // Sliders
        brushSlider.oninput = () => {
            brushSizeValue = parseInt(brushSlider.value);
            brushSizeValLabel.textContent = brushSizeValue;
        };
        densitySlider.oninput = () => {
            densityValue = parseInt(densitySlider.value);
            densityValLabel.textContent = densityValue;
        };
        opacitySlider.oninput = () => {
            opacityValue = opacitySlider.value / 100;
            opacityValLabel.textContent = opacitySlider.value;
        };
        waveStrengthSlider.oninput = () => {
            waveStrength = parseInt(waveStrengthSlider.value);
            waveStrengthVal.textContent = waveStrength;
        };
        waveFrequencySlider.oninput = () => {
            waveFrequency = parseInt(waveFrequencySlider.value);
            waveFrequencyVal.textContent = waveFrequency;
        };
        waveDirectionSlider.oninput = () => {
            waveDirection = parseInt(waveDirectionSlider.value);
            waveDirectionVal.textContent = waveDirection + "°";
        };
        const mirrorFadeSlider = document.getElementById("mirrorFadeSlider");
        mirrorFadeSlider.oninput = () => {
            mirrorFade = mirrorFadeSlider.value / 100;
            document.getElementById("mirrorFadeVal").textContent = mirrorFadeSlider.value;
        };
        document.getElementById("mirrorOffsetInput").oninput = (e) => {
            mirrorOffsetFactor = parseFloat(e.target.value) || 0.9;
        };

        // === Initialization ===
        function init() {
            resizeCanvasToWindow();
            drawCanvas.width = 800;
            drawCanvas.height = 800;
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            centerCamera();
            requestAnimationFrame(render);
            ropeIndicator.innerHTML = "⚡ Rope Mode: OFF (Langsung nempel)";
        }

        // Register events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 2) handlePinchStart(e);
            else if (e.touches.length === 1) startInteraction(e.touches[0].pageX, e.touches[0].pageY);
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 2) handlePinchMove(e);
            else if (e.touches.length === 1) moveInteraction(e.touches[0].pageX, e.touches[0].pageY);
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) initialPinchDist = null;
            if (e.touches.length === 0) endInteraction();
        });
        canvas.addEventListener('mousedown', (e) => startInteraction(e.pageX, e.pageY));
        window.addEventListener('mousemove', (e) => moveInteraction(e.pageX, e.pageY));
        window.addEventListener('mouseup', endInteraction);
        window.addEventListener('resize', () => {
            resizeCanvasToWindow();
            centerCamera();
        });

        init();
    })();
</script>
