<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EditorGambar(Seamless)</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #ccc;
            overflow: hidden;
            touch-action: none; 
        }

        .ui-panel {
            width: 100%;
            max-width: 500px;
            background-color: #333;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 20;
            flex-shrink: 0;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 2px;
            margin-bottom: 8px;
        }

        .icon-btn {
            background-color: #2e5873;
            border: 1px solid #555;
            border-radius: 5px;
            padding: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            color: white;
            flex: 1;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .icon-btn:active { background-color: #00ffff; }
        .icon-btn.active { background-color: #ff3b30; border-color: #ff3b30; }
        
        #btnShift.active { background-color: #ffcc00; color: #000; border-color: #ffcc00; }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .input-group { display: flex; align-items: center; gap: 3px; }

        input[type="number"] {
            background-color: #1a1a1a;
            border: 1px solid #444;
            color: white;
            padding: 3px;
            width: 45px;
            border-radius: 3px;
            font-size: 11px;
        }

        .slider-container { display: flex; flex-direction: column; gap: 4px; }
        .slider-row { display: flex; align-items: center; gap: 8px; }
        .slider-row label { width: 80px; font-size: 11px; text-align: right;}
        input[type="range"] { flex-grow: 1; accent-color: #007aff; height: 3px; }
        .value-label { width: 25px; text-align: left; font-size: 11px; color: #aaa; }

        #canvasBox {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            z-index: 10;
            touch-action: none; 
        }

        #canvasBox.shift-mode { cursor: crosshair; }

        #viewCanvas {
            /* Visual preview background */
            background-color: #ffffff; 
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), 
                              linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            image-rendering: pixelated;
        }

        /* Grid overlay untuk mode shift */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(255, 204, 0, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 204, 0, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 15;
            display: none;
        }
        #canvasBox.shift-mode .grid-overlay {
            display: block;
        }

.icon-btn {
  display: flex;
  flex-direction: column; /* icon di atas, teks di bawah */
  align-items: center;    /* rata tengah */
  justify-content: center;
}

.icon {
  font-size: 20px; /* ukuran icon */
}

.menu-text {
  font-size: 7px; /* ukuran teks */
  margin-top: 2px; /* jarak dari icon */
  color: white; /* atur warna text menu*/
}

    </style>
</head>
<body>

   <div class="ui-panel">
    <div class="toolbar">
        <button class="icon-btn" onclick="newCanvas()" title="New">📐<span class="menu-text">canvas</span></button>
        <button class="icon-btn" onclick="loadImage()" title="Image">🖼️<span class="menu-text">gambar</span></button>
        <button class="icon-btn" onclick="loadBrush()" title="Brush">🎨<span class="menu-text">brush</span></button>
        <button class="icon-btn" id="btnDraw" onclick="setMode('draw')" title="Draw">✏️<span class="menu-text">draw</span></button>
        <button class="icon-btn active" id="btnMove" onclick="setMode('move')" title="Move Camera">✋<span class="menu-text">geser</span></button>
        <button class="icon-btn" id="btnShift" onclick="setMode('shift')" title="Seamless Grid Shift">🔄<span class="menu-text">seamless</span></button>
        <button class="icon-btn" onclick="undo()" title="Undo">↩️<span class="menu-text">undo</span></button>
        <button class="icon-btn" onclick="redo()" title="Redo">↪️<span class="menu-text">redo</span></button>
        <button class="icon-btn" onclick="savePNG()" title="Save PNG">💾<span class="menu-text">simpan</span></button>
    </div>

    <div class="settings-row">
        <div class="input-group">
            <label>W:</label>
            <input type="number" id="canvasW" value="800">
        </div>
        <div class="input-group">
            <label>H:</label>
            <input type="number" id="canvasH" value="800">
        </div>
        <span>Zoom: <span id="zoomVal">100</span>%</span>
    </div>

    <div class="slider-container">
        <div class="slider-row">
            <label>Ukuran Brush:</label>
            <input type="range" id="brushSize" min="50" max="3000" value="50">
            <span class="value-label" id="brushSizeVal">50</span>
        </div>
        <div class="slider-row">
            <label>Kepadatan:</label>
            <input type="range" id="densitySlider" min="1" max="100" value="30">
            <span class="value-label" id="densityVal">30</span>
        </div>
        <div class="slider-row">
           
        </div>
    </div>
</div>

<div id="canvasBox">
    <canvas id="viewCanvas"></canvas>
    <div class="grid-overlay"></div>
</div>

<input type="file" id="imageInput" accept="image/*" hidden>
<input type="file" id="brushInput" accept="image/*" hidden>

<script>
(function() {
    const canvasBox = document.getElementById("canvasBox");
    const canvas = document.getElementById("viewCanvas");
    const ctx = canvas.getContext("2d");
    const zoomValLabel = document.getElementById("zoomVal");
    const brushSlider = document.getElementById("brushSize");
    const brushSizeValLabel = document.getElementById("brushSizeVal");
    const densitySlider = document.getElementById("densitySlider");
    const densityValLabel = document.getElementById("densityVal");

    // Canvas Kerja Utama (Default Transparan)
    let drawCanvas = document.createElement("canvas");
    let drawCtx = drawCanvas.getContext("2d");
    
    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");
    
    let baseImage = null, brush = null;
    let mode = "move";
    
    let strokes = [];  
    let redoStack = [];
    let currentStroke = null;

    let scale = 1.0; 
    let offsetX = 0, offsetY = 0;

    let isDragging = false;
    let lastPointerX = 0, lastPointerY = 0;
    let lastDrawX = 0, lastDrawY = 0;
    
    let initialPinchDist = null, initialScale = 1.0;
    let pinchCenterX = 0, pinchCenterY = 0;

    // Grid size untuk shift seamless
    const GRID_SIZE = 50; // 50 piksel

    function init() {
        resizeCanvasToWindow();
        drawCanvas.width = 800;
        drawCanvas.height = 800;
        
        // Memulai dengan kondisi bersih/transparan
        drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        
        centerCamera();
        requestAnimationFrame(render);
    }

    function resizeCanvasToWindow() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', () => { 
        resizeCanvasToWindow(); 
        centerCamera(); 
    });

    function centerCamera() {
        // Posisikan canvas dengan offset 50px dari tepi
        const margin = 50;
        offsetX = margin;
        offsetY = margin + 75; // +75 untuk kompensasi panel
        
        // Skala agar canvas muat dalam area yang tersisa
        scale = Math.min(
            (window.innerWidth - 100) / drawCanvas.width,
            (window.innerHeight - 200) / drawCanvas.height,
            2
        );
        scale = Math.max(0.1, scale);
    }

    brushSlider.oninput = () => { 
        brushSizeValue = parseInt(brushSlider.value); 
        brushSizeValLabel.textContent = brushSlider.value; 
    };
    let brushSizeValue = 50;
    
    densitySlider.oninput = () => { 
        densityValue = parseInt(densitySlider.value); 
        densityValLabel.textContent = densitySlider.value; 
    };
    let densityValue = 30;

    // Fungsi shift seamless dengan grid
    function applyGridShift(dx, dy) {
        // Hanya bergeser jika pergerakan mencapai minimal setengah grid
        const gridX = Math.round(dx / GRID_SIZE) * GRID_SIZE;
        const gridY = Math.round(dy / GRID_SIZE) * GRID_SIZE;
        
        if (gridX === 0 && gridY === 0) return;
        
        const w = drawCanvas.width;
        const h = drawCanvas.height;
        let shiftX = gridX % w;
        let shiftY = gridY % h;
        if (shiftX < 0) shiftX += w;
        if (shiftY < 0) shiftY += h;

        if (shiftX === 0 && shiftY === 0) return;

        tempCanvas.width = w;
        tempCanvas.height = h;
        tempCtx.clearRect(0, 0, w, h);

        // Pergeseran seamless 4 arah
        tempCtx.drawImage(drawCanvas, 0, 0, w - shiftX, h - shiftY, shiftX, shiftY, w - shiftX, h - shiftY);
        tempCtx.drawImage(drawCanvas, w - shiftX, 0, shiftX, h - shiftY, 0, shiftY, shiftX, h - shiftY);
        tempCtx.drawImage(drawCanvas, 0, h - shiftY, w - shiftX, shiftY, shiftX, 0, w - shiftX, shiftY);
        tempCtx.drawImage(drawCanvas, w - shiftX, h - shiftY, shiftX, shiftY, 0, 0, shiftX, shiftY);

        drawCtx.clearRect(0, 0, w, h);
        drawCtx.drawImage(tempCanvas, 0, 0);
        
        // Beritahu user bahwa shift telah dilakukan (opsional)
        console.log(`Grid shifted by (${gridX}, ${gridY}) pixels`);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        
        // Visual Preview: Latar belakang putih/checkerboard
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, drawCanvas.width, drawCanvas.height);
        
        // Menggambar konten utama
        ctx.drawImage(drawCanvas, 0, 0);
        
        // Border dengan warna sesuai mode
        ctx.strokeStyle = (mode === 'shift') ? "#ffcc00" : "#444";
        ctx.lineWidth = 1 / scale; 
        ctx.strokeRect(0, 0, drawCanvas.width, drawCanvas.height);
        
        ctx.restore();
        
        zoomValLabel.innerText = Math.round(scale * 100);
        requestAnimationFrame(render);
    }

    function saveState() {
        if (strokes.length > 20) strokes.shift();
        strokes.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
        redoStack = [];
    }

    function getInternalCoord(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (clientX - rect.left - offsetX) / scale,
            y: (clientY - rect.top - offsetY) / scale
        };
    }

    // Fungsi untuk mendapatkan koordinat grid yang disnap
    function getSnappedGridCoord(clientX, clientY) {
        const internal = getInternalCoord(clientX, clientY);
        // Snap ke grid 50px dalam koordinat kanvas
        const snapX = Math.round(internal.x / GRID_SIZE) * GRID_SIZE;
        const snapY = Math.round(internal.y / GRID_SIZE) * GRID_SIZE;
        return { x: snapX, y: snapY };
    }

    function startInteraction(x, y) {
        isDragging = true;
        lastPointerX = x; 
        lastPointerY = y;
        const internal = getInternalCoord(x, y);
        lastDrawX = internal.x; 
        lastDrawY = internal.y;
        
        if (mode === 'draw' && brush) {
            if (internal.x >= 0 && internal.x <= drawCanvas.width && 
                internal.y >= 0 && internal.y <= drawCanvas.height) {
                saveState();
                addBrushPoint(internal.x, internal.y);
            } else { isDragging = false; }
        } 
        else if (mode === 'shift') { 
            // Saat shift, kita simpan state untuk undo
            saveState(); 
        }
    }

    function moveInteraction(x, y) {
        if (!isDragging) return;
        const dx = x - lastPointerX;
        const dy = y - lastPointerY;
        
        if (mode === 'move') {
            offsetX += dx;
            offsetY += dy;
            lastPointerX = x; 
            lastPointerY = y;
        } 
        else if (mode === 'draw' && brush) {
            const internal = getInternalCoord(x, y);
            const dist = Math.hypot(internal.x - lastDrawX, internal.y - lastDrawY);
            if (dist > brushSizeValue / (densityValue * 2)) {
                addBrushPoint(internal.x, internal.y);
                lastDrawX = internal.x;
                lastDrawY = internal.y;
            }
            lastPointerX = x; 
            lastPointerY = y;
        }
        else if (mode === 'shift') {
            // Dalam mode shift, kita hitung pergeseran grid
            // Tapi kita tidak langsung shift saat drag, karena grid shift dilakukan per klik/tap
            // Untuk drag, kita bisa akumulasi pergeseran dan shift ketika mencapai threshold grid
            // Namun agar lebih intuitif, kita akan lakukan shift saat mouse/touch dilepas
            // Simpan akumulasi pergerakan
            lastPointerX = x; 
            lastPointerY = y;
        }
    }

    function endInteraction() {
        if (isDragging && mode === 'shift') {
            // Hitung pergeseran total selama drag
            const startInternal = getInternalCoord(lastPointerX, lastPointerY); // Sebenarnya kita butuh titik awal drag
            // Alternatif: gunakan lastPointerX,Y sebagai posisi akhir, dan simpan posisi awal saat startInteraction
            // Untuk sederhana, kita akan implementasikan pergeseran grid berdasarkan klik saja (bukan drag)
            // Tapi kita bisa hitung perbedaan antara posisi awal dan akhir
            // Kita simpan posisi awal di variabel global
            if (shiftStartX !== undefined && shiftStartY !== undefined) {
                const endInternal = getInternalCoord(lastPointerX, lastPointerY);
                const deltaX = endInternal.x - shiftStartX;
                const deltaY = endInternal.y - shiftStartY;
                applyGridShift(deltaX, deltaY);
            }
        }
        isDragging = false;
        shiftStartX = undefined;
        shiftStartY = undefined;
    }

    // Variabel untuk menyimpan posisi awal shift
    let shiftStartX, shiftStartY;

    // Override startInteraction untuk mode shift
    const originalStart = startInteraction;
    startInteraction = function(x, y) {
        if (mode === 'shift') {
            isDragging = true;
            lastPointerX = x; 
            lastPointerY = y;
            const internal = getInternalCoord(x, y);
            shiftStartX = internal.x;
            shiftStartY = internal.y;
            saveState(); // simpan state sebelum shift
        } else {
            originalStart(x, y);
        }
    };

    // Override endInteraction untuk mode shift
    const originalEnd = endInteraction;
    endInteraction = function() {
        if (isDragging && mode === 'shift' && shiftStartX !== undefined && shiftStartY !== undefined) {
            // Hitung posisi akhir berdasarkan lastPointerX, lastPointerY
            const internal = getInternalCoord(lastPointerX, lastPointerY);
            const deltaX = internal.x - shiftStartX;
            const deltaY = internal.y - shiftStartY;
            
            // Hitung snap grid
            const gridDeltaX = Math.round(deltaX / GRID_SIZE) * GRID_SIZE;
            const gridDeltaY = Math.round(deltaY / GRID_SIZE) * GRID_SIZE;
            
            if (gridDeltaX !== 0 || gridDeltaY !== 0) {
                applyGridShift(gridDeltaX, gridDeltaY);
            }
        }
        isDragging = false;
        shiftStartX = undefined;
        shiftStartY = undefined;
    };

    // Tambahkan handler untuk klik/tap tunggal (tanpa drag)
    canvas.addEventListener('click', (e) => {
        if (mode === 'shift') {
            const internal = getInternalCoord(e.pageX, e.pageY);
            // Pergeseran 1 grid ke arah yang paling dekat dengan tepi grid? 
            // Atau kita bisa shift berdasarkan kuadran?
            // Implementasi sederhana: geser 1 grid ke kanan bawah
            // Tapi lebih baik jika user bisa menggeser dengan drag
            // Untuk klik, kita bisa tidak melakukan apa-apa
        }
    });

    function addBrushPoint(ix, iy) {
        const size = brushSizeValue;
        const ratio = brush.width / brush.height;
        let dw = ratio >= 1 ? size : size * ratio;
        let dh = ratio >= 1 ? size / ratio : size;
        drawCtx.drawImage(brush, ix - dw/2, iy - dh/2, dw, dh);
        lastDrawX = ix; 
        lastDrawY = iy;
    }

    // Input Events
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) handlePinchStart(e);
        else if (e.touches.length === 1) startInteraction(e.touches[0].pageX, e.touches[0].pageY);
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) handlePinchMove(e);
        else if (e.touches.length === 1) moveInteraction(e.touches[0].pageX, e.touches[0].pageY);
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (e.touches.length < 2) initialPinchDist = null;
        if (e.touches.length === 0) endInteraction();
    }, { passive: false });
    canvas.addEventListener('mousedown', (e) => startInteraction(e.pageX, e.pageY));
    window.addEventListener('mousemove', (e) => moveInteraction(e.pageX, e.pageY));
    window.addEventListener('mouseup', endInteraction);

    function handlePinchStart(e) {
        const t1 = e.touches[0], t2 = e.touches[1];
        initialPinchDist = Math.hypot(t1.pageX - t2.pageX, t1.pageY - t2.pageY);
        initialScale = scale;
        const centerX = (t1.pageX + t2.pageX) / 2, centerY = (t1.pageY + t2.pageY) / 2;
        const internal = getInternalCoord(centerX, centerY);
        pinchCenterX = internal.x; pinchCenterY = internal.y;
        isDragging = false;
    }

    function handlePinchMove(e) {
        if (!initialPinchDist) return;
        const t1 = e.touches[0], t2 = e.touches[1];
        const newDist = Math.hypot(t1.pageX - t2.pageX, t1.pageY - t2.pageY);
        let newScale = Math.max(0.05, Math.min(15, initialScale * (newDist / initialPinchDist)));
        const nCX = (t1.pageX + t2.pageX) / 2, nCY = (t1.pageY + t2.pageY) / 2;
        const rect = canvas.getBoundingClientRect();
        offsetX = nCX - rect.left - (pinchCenterX * newScale);
        offsetY = nCY - rect.top - (pinchCenterY * newScale);
        scale = newScale;
    }

    window.setMode = (m) => {
        mode = m;
        document.getElementById("btnDraw").classList.toggle("active", m === "draw");
        document.getElementById("btnMove").classList.toggle("active", m === "move");
        document.getElementById("btnShift").classList.toggle("active", m === "shift");
        canvasBox.classList.toggle("shift-mode", m === "shift");
    };

    window.newCanvas = () => {
        const w = parseInt(document.getElementById("canvasW").value) || 800;
        const h = parseInt(document.getElementById("canvasH").value) || 800;
        drawCanvas.width = w; drawCanvas.height = h;
        baseImage = null; strokes = []; redoStack = [];
        drawCtx.clearRect(0, 0, w, h);
        centerCamera();
    };

    window.undo = () => { 
        if (strokes.length > 0) {
            redoStack.push(strokes.pop());
            if (strokes.length > 0) drawCtx.putImageData(strokes[strokes.length - 1], 0, 0);
            else {
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                if (baseImage) drawCtx.drawImage(baseImage, 0, 0);
            }
        }
    };
    
    window.redo = () => { 
        if (redoStack.length > 0) {
            strokes.push(redoStack.pop());
            drawCtx.putImageData(strokes[strokes.length - 1], 0, 0);
        }
    };
    
    window.loadImage = () => document.getElementById("imageInput").click();
    document.getElementById("imageInput").onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => { 
                baseImage = img; 
                drawCanvas.width = img.width; drawCanvas.height = img.height;
                document.getElementById("canvasW").value = img.width;
                document.getElementById("canvasH").value = img.height;
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                drawCtx.drawImage(img, 0, 0);
                strokes = []; redoStack = [];
                saveState(); centerCamera(); 
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    window.loadBrush = () => document.getElementById("brushInput").click();
    document.getElementById("brushInput").onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            brush = new Image();
            brush.onload = () => setMode('draw');
            brush.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    // Simpan sebagai PNG Transparan
    window.savePNG = () => {
        const link = document.createElement("a");
        link.download = "transparent_texture_" + Date.now() + ".png";
        link.href = drawCanvas.toDataURL("image/png");
        link.click();
    };

    init();
})();
</script>
</body>
</html>
